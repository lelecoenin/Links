<title>Thay.dev — links</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --bg-elevated: #11161d;
    --border: #21262d;
    --text: #c9d1d9;
    --text-dim: #6e7681;
    --text-bright: #f0f3f6;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-amber: #e3b341;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }
  .card { max-width: 420px; width: 100%; }

  .avatar-ring {
    width: 96px; height: 96px;
    border-radius: 50%;
    margin: 0 auto 20px;
    overflow: hidden;
    border: 2px solid var(--accent-blue);
    box-shadow: 0 0 24px rgba(88, 166, 255, 0.35);
  }
  .avatar-ring img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  h1 {
    font-family: var(--mono);
    text-align: center;
    color: var(--text-bright);
    font-size: 22px;
    margin-bottom: 6px;
  }

  p.tag {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 4px;
  }

  p.status {
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent-green);
    margin-bottom: 32px;
  }
  p.status::before { content: '● '; }

  .links { display: flex; flex-direction: column; gap: 12px; }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    color: var(--text-bright);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: border-color 0.2s, transform 0.15s;
  }
  .link-btn:hover { border-color: var(--accent-blue); transform: translateY(-2px); }
  .link-btn .icon { font-size: 20px; width: 24px; text-align: center; }
  .link-btn .arrow { margin-left: auto; color: var(--text-dim); font-family: var(--mono); }

  .link-btn.primary {
    background: var(--accent-blue);
    color: #0d1117;
    border-color: var(--accent-blue);
  }
  .link-btn.primary .arrow { color: #0d1117; }

  footer {
    text-align: center;
    margin-top: 36px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }
</style>
</head>
